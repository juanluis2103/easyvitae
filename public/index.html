<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>easyvitae — CV Markdown a PDF (ATS-friendly)</title>
  <style>
    :root {
      --bg: #0f172a;
      --panel: #1e293b;
      --border: #334155;
      --text: #e2e8f0;
      --muted: #94a3b8;
      --accent: #38bdf8;
      --accent-dark: #0ea5e9;
    }
    * { box-sizing: border-box; }
    body {
      margin: 0;
      font-family: 'Segoe UI', system-ui, sans-serif;
      background: var(--bg);
      color: var(--text);
      height: 100vh;
      display: flex;
      flex-direction: column;
    }
    header {
      padding: 14px 20px;
      border-bottom: 1px solid var(--border);
      display: flex;
      align-items: center;
      gap: 14px;
      flex-wrap: wrap;
    }
    header h1 { font-size: 18px; margin: 0; }
    header h1 span { color: var(--accent); }
    header .sub { color: var(--muted); font-size: 13px; }
    .controls { margin-left: auto; display: flex; gap: 10px; align-items: center; flex-wrap: wrap; }
    label { font-size: 13px; color: var(--muted); display: flex; align-items: center; gap: 6px; }
    select, input[type="text"] {
      background: var(--panel);
      color: var(--text);
      border: 1px solid var(--border);
      border-radius: 6px;
      padding: 6px 8px;
      font-size: 13px;
    }
    button {
      background: var(--accent-dark);
      color: #04121e;
      border: none;
      border-radius: 6px;
      padding: 8px 16px;
      font-size: 14px;
      font-weight: 600;
      cursor: pointer;
    }
    button:hover { background: var(--accent); }
    button.ghost {
      background: transparent;
      color: var(--text);
      border: 1px solid var(--border);
    }
    button.ghost:hover { border-color: var(--accent); color: var(--accent); }
    main { flex: 1; display: flex; min-height: 0; }
    .pane { flex: 1; display: flex; flex-direction: column; min-width: 0; }
    .pane + .pane { border-left: 1px solid var(--border); }
    .pane-head {
      padding: 8px 14px;
      font-size: 12px;
      text-transform: uppercase;
      letter-spacing: 0.5px;
      color: var(--muted);
      border-bottom: 1px solid var(--border);
      display: flex;
      align-items: center;
      gap: 10px;
    }
    textarea {
      flex: 1;
      resize: none;
      border: none;
      background: #0b1220;
      color: var(--text);
      padding: 16px;
      font-family: 'Cascadia Code', 'Consolas', monospace;
      font-size: 13px;
      line-height: 1.5;
      outline: none;
    }
    iframe { flex: 1; border: none; background: #fff; }
    .file-label {
      cursor: pointer;
      color: var(--accent);
      font-size: 13px;
    }
    .file-label input { display: none; }
    #status { font-size: 12px; color: var(--muted); }
  </style>
</head>
<body>
  <header>
    <h1>easy<span>vitae</span></h1>
    <span class="sub">CV en Markdown → PDF limpio y ATS-friendly</span>
    <div class="controls">
      <label>Fuente
        <select id="font">
          <option value="calibri">Calibri</option>
          <option value="arial">Arial</option>
          <option value="garamond">Garamond</option>
        </select>
      </label>
      <label>Tamaño
        <select id="bodySize">
          <option value="10">10 pt</option>
          <option value="10.5" selected>10.5 pt</option>
          <option value="11">11 pt</option>
        </select>
      </label>
      <button class="ghost" id="refresh">Actualizar vista</button>
      <button id="download">Descargar PDF</button>
    </div>
  </header>
  <main>
    <section class="pane">
      <div class="pane-head">
        Markdown
        <label class="file-label">📂 Cargar .md
          <input type="file" id="fileInput" accept=".md,.markdown,text/markdown,text/plain" />
        </label>
        <span id="status"></span>
      </div>
      <textarea id="editor" spellcheck="false" placeholder="Pega aquí tu CV en Markdown..."></textarea>
    </section>
    <section class="pane">
      <div class="pane-head">Vista previa</div>
      <iframe id="preview" title="Vista previa del CV"></iframe>
    </section>
  </main>

  <script src="/app.js"></script>
</body>
</html>
